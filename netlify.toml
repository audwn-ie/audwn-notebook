[build]
  command   = "npm run build"
  publish   = "dist"
  functions = "netlify/functions"

# Redirect everything to index.html so React routing works
[[redirects]]
  from   = "/*"
  to     = "/index.html"
  status = 200

[dev]
  command     = "npm run dev"
  targetPort  = 5173
  port        = 8888
  autoLaunch  = false
